title: CronLord
description: >-
  A visual, self-hosted cron scheduler in a single Crystal binary.
  Web UI, REST API, remote workers, audit trail — ~15 MB RSS idle.
url: https://kdairatchi.github.io
baseurl: /CronLord
repository: kdairatchi/CronLord

remote_theme: just-the-docs/just-the-docs
color_scheme: light

search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true
nav_external_links:
  - title: GitHub
    url: https://github.com/kdairatchi/CronLord
  - title: GHCR image
    url: https://github.com/kdairatchi/CronLord/pkgs/container/cronlord
  - title: Security policy
    url: https://github.com/kdairatchi/CronLord/blob/main/SECURITY.md

aux_links:
  Source: https://github.com/kdairatchi/CronLord

footer_content: >-
  CronLord is MIT-licensed. Built by
  <a href="https://github.com/kdairatchi">kdairatchi</a>.
  Report security issues privately — see
  <a href="https://github.com/kdairatchi/CronLord/blob/main/SECURITY.md">SECURITY.md</a>.

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y"

gh_edit_link: true
gh_edit_link_text: Edit this page on GitHub
gh_edit_repository: https://github.com/kdairatchi/CronLord
gh_edit_branch: main
gh_edit_source: docs
gh_edit_view_mode: tree

callouts:
  warning:
    title: Warning
    color: yellow
  danger:
    title: Danger
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - screenshots/*.xcf
  - "*.psd"
