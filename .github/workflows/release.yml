name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: build ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux-amd64
            platform: linux/amd64
          - arch: linux-arm64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.arch == 'linux-arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static binary
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file Dockerfile.release \
            --target export \
            --output type=local,dest=./dist \
            .

      - name: Package tarball (binary at tarball root — matches scripts/install.sh)
        run: |
          mkdir -p release
          chmod +x dist/cronlord
          tar -czf release/cronlord-${{ matrix.arch }}.tar.gz -C dist cronlord
          (cd release && sha256sum cronlord-${{ matrix.arch }}.tar.gz > cronlord-${{ matrix.arch }}.tar.gz.sha256)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cronlord-${{ matrix.arch }}
          path: release/*

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect
        run: |
          mkdir -p release
          find dist -type f -name 'cronlord-linux-*.tar.gz*' -exec cp {} release/ \;
          ls -la release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  docker:
    name: publish docker image
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write   # keyless cosign via GitHub OIDC
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        run: |
          ref="${GITHUB_REF#refs/tags/}"           # v0.3.4
          ver="${ref#v}"                           # 0.3.4
          minor="${ver%.*}"                        # 0.3
          lower_owner="${GITHUB_REPOSITORY_OWNER,,}"
          base="ghcr.io/${lower_owner}/cronlord"
          {
            echo "base=${base}"
            echo "version=${ver}"
            echo "tags=${base}:${ver},${base}:${minor},${base}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=CronLord
            org.opencontainers.image.description=Visual, self-hosted cron scheduler in a single Crystal binary.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.tags.outputs.tags }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign each tag-qualified reference at its digest so the
          # signature is pinned to the exact bytes we just pushed.
          IFS=',' read -ra tag_list <<< "$TAGS"
          for t in "${tag_list[@]}"; do
            ref="${t}@${DIGEST}"
            echo "signing $ref"
            cosign sign --yes "$ref"
          done
